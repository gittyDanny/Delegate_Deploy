<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delegat Proof of Concept</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .ai-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.35; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex">
        <aside class="w-64 bg-gray-950 text-white p-6 fixed h-screen">
            <h1 class="text-2xl font-bold mb-1">Delegat</h1>
            <p class="text-xs text-gray-400 mb-8">Proof of Concept</p>

            <nav class="space-y-2 text-sm">
                <a href="{{ url_for('web.dashboard') }}#dashboard"
                   class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                    Dashboard
                </a>

                <a href="{{ url_for('web.dashboard') }}#merchants"
                   class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                    Merchants
                </a>

                {% if merchant is defined %}
                    <a href="{{ url_for('web.merchant_detail', merchant_id=merchant.id) }}#documents"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        Documents
                    </a>

                    <a href="{{ url_for('web.merchant_detail', merchant_id=merchant.id) }}#ai-agent"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        AI Agent
                    </a>

                    <a href="{{ url_for('web.audit_log', merchant_id=merchant.id) }}"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        Audit Log
                    </a>
                {% else %}
                    <a href="{{ url_for('web.dashboard') }}#merchants"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        Documents
                    </a>

                    <a href="{{ url_for('web.dashboard') }}#dashboard"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        AI Agent
                    </a>

                    <a href="{{ url_for('web.dashboard') }}#dashboard"
                       class="block px-3 py-2 rounded-lg hover:bg-gray-800">
                        Audit Log
                    </a>
                {% endif %}
            </nav>
        </aside>

        <main class="ml-64 w-full p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
