<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Händler Login – Delegat</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-purple-700">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">Delegat</h1>
            <h2 class="text-xl font-semibold text-gray-800">Händler-Login</h2>
        </div>
        <p class="text-gray-600 text-center mb-6">
            Geben Sie Ihren Firmennamen ein, um zum Dashboard zu gelangen.
        </p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    {% for m in messages %}<p class="text-sm">{{ m }}</p>{% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('merchant.login') }}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Firmenname</label>
                <input type="text" name="company_name" placeholder="z.B. Müller Metallbau GmbH" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
                Anmelden
            </button>
        </form>
        <div class="mt-6 text-center">
            <a href="{{ url_for('web.dashboard') }}" class="text-sm text-blue-600 hover:underline">
                ← Zurück zum Admin-Dashboard
            </a>
        </div>
    </div>
</body>
</html>
